<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AccessAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8e6f0;
    }

    .header {
      background: linear-gradient(135deg, #1a1d27, #22263a);
      padding: 18px 20px;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #7c6ef0, #5b4bd0);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 16px; color: #fff;
    }
    .title { font-size: 16px; font-weight: 700; }
    .title span { color: #7c6ef0; }
    .badge {
      margin-left: auto;
      background: #2d2a4a; color: #7c6ef0;
      font-size: 9px; font-weight: 700;
      padding: 3px 7px; border-radius: 10px;
      letter-spacing: 0.5px;
    }

    .status-bar {
      padding: 12px 20px;
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3e;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #a0a0b8;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    .dot.off { background: #6b6b85; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .body { padding: 16px 20px; }

    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #6b6b85;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .toggle-label { font-size: 13px; color: #e8e6f0; }
    .toggle {
      width: 40px; height: 22px;
      background: #2a2d3e;
      border-radius: 11px;
      position: relative;
      cursor: pointer;
      border: none;
      transition: background 0.3s;
    }
    .toggle.on { background: #7c6ef0; }
    .toggle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle.on::after { transform: translateX(18px); }

    .slider-row { margin-bottom: 14px; }
    .slider-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .slider-label { font-size: 12px; color: #a0a0b8; }
    .slider-value { font-size: 12px; color: #7c6ef0; font-weight: 600; }
    input[type=range] {
      width: 100%;
      accent-color: #7c6ef0;
      height: 4px;
    }

    .scheme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }
    .scheme-btn {
      padding: 8px;
      border-radius: 8px;
      border: 2px solid #2a2d3e;
      background: #1a1d27;
      color: #a0a0b8;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .scheme-btn.active {
      border-color: #7c6ef0;
      background: #2d2a4a;
      color: #7c6ef0;
    }

    .last-action {
      background: #2d2a4a;
      border: 1px solid #7c6ef044;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .last-action-label { font-size: 10px; color: #7c6ef0; font-weight: 700; letter-spacing: 1px; }
    .last-action-value { font-size: 13px; color: #e8e6f0; font-weight: 600; margin-top: 2px; }

    .run-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c6ef0, #5b4bd0);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 16px #7c6ef044;
      margin-bottom: 10px;
      transition: all 0.2s;
    }
    .run-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .rounds-bar {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b6b85;
      padding-top: 4px;
    }

    .divider {
      height: 1px;
      background: #2a2d3e;
      margin: 14px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">A</div>
    <div>
      <div class="title">Access<span>AI</span></div>
    </div>
    <div class="badge">RL-POWERED</div>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Agent active on this page</span>
  </div>

  <div class="body">
    <div class="section-title">Agent Control</div>

    <div class="toggle-row">
      <span class="toggle-label">Auto-Personalise</span>
      <button class="toggle on" id="autoToggle"></button>
    </div>

    <div id="lastActionBox" class="last-action" style="display:none">
      <div class="last-action-label">LAST ACTION</div>
      <div class="last-action-value" id="lastActionText">—</div>
    </div>

    <button class="run-btn" id="runBtn">▶ Run Agent Now</button>

    <div class="rounds-bar">
      <span>Agent rounds: <strong id="roundsCount">0</strong></span>
      <span>Reward: <strong id="lastReward" style="color:#22c55e">—</strong></span>
    </div>

    <div class="divider"></div>

    <div class="section-title">Manual Override</div>

    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label">Font Size</span>
        <span class="slider-value" id="fontVal">16px</span>
      </div>
      <input type="range" id="fontSlider" min="0" max="1" step="0.05" value="0.4" />
    </div>

    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label">Contrast</span>
        <span class="slider-value" id="contrastVal">100%</span>
      </div>
      <input type="range" id="contrastSlider" min="0" max="1" step="0.05" value="0.5" />
    </div>

    <div class="slider-row">
      <div class="slider-header">
        <span class="slider-label">Line Spacing</span>
        <span class="slider-value" id="spacingVal">1.6</span>
      </div>
      <input type="range" id="spacingSlider" min="0" max="1" step="0.05" value="0.4" />
    </div>

    <div class="section-title" style="margin-top:14px">Colour Scheme</div>
    <div class="scheme-grid">
      <button class="scheme-btn active" data-scheme="0">Default</button>
      <button class="scheme-btn" data-scheme="1">Dark Mode</button>
      <button class="scheme-btn" data-scheme="2">High Contrast</button>
      <button class="scheme-btn" data-scheme="3">Warm</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
